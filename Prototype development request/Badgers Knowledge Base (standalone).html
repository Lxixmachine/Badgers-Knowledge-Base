<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Badgers Wrestling — Knowledge Base</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
<style>
/* ============ THEME TOKENS ============ */
:root{
  --accent:#E23B3F;
  --bg:#0c0c0f; --bg2:#121217; --surf:#17171d; --surf2:#1e1e26;
  --line:#26262f; --line2:#32323d;
  --tx:#f4f4f5; --tx2:#b6b6bf; --tx3:#7f7f8a;
  --shadow:0 1px 0 rgba(255,255,255,.03), 0 18px 40px -24px rgba(0,0,0,.8);
  --radius:14px; --maxw:1240px;
  --card-radius:14px; --card-rest-shadow:none; --detail-width:min(560px,100%);
  --gap:22px; --pad:30px; --cardpad:20px;
  --side:#101015;
}
:root[data-theme="light"]{
  --bg:#f4f3ef; --bg2:#ffffff; --surf:#ffffff; --surf2:#f7f6f2;
  --line:#e4e2db; --line2:#d6d3ca;
  --tx:#171513; --tx2:#55514b; --tx3:#8d887f;
  --shadow:0 1px 2px rgba(20,18,15,.04), 0 18px 38px -26px rgba(20,18,15,.28);
  --side:#1a1816;
}
:root[data-theme="ink"]{
  --bg:#08080a; --bg2:#0d0d10; --surf:#101013; --surf2:#16161b;
  --line:#1d1d23; --line2:#28282f;
  --tx:#e8e8ea; --tx2:#9a9aa3; --tx3:#5f5f68;
  --shadow:0 18px 44px -26px rgba(0,0,0,.92);
  --side:#070709;
}
:root[data-density="compact"]{ --gap:14px; --pad:22px; --cardpad:16px; }
:root[data-density="comfy"]{ --gap:30px; --pad:40px; --cardpad:26px; }

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Public Sans",system-ui,sans-serif;
  background:var(--bg); color:var(--tx);
  -webkit-font-smoothing:antialiased; line-height:1.5;
}
#root{height:100%}
::selection{background:var(--accent);color:#fff}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.label, .nav__head{font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:.12em}

/* ============ SHELL ============ */
.shell{display:flex;height:100%;overflow:hidden}

/* ---- Sidebar ---- */
.side{
  width:268px;flex-shrink:0;background:var(--side);color:#f4f4f5;
  display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06);
  padding:22px 16px;gap:8px;z-index:40;
}
:root[data-theme="light"] .side{border-right:none}
.brand{display:flex;align-items:center;gap:12px;padding:6px 8px 16px}
.brand__mark{
  width:42px;height:42px;flex-shrink:0;border-radius:9px;background:var(--accent);
  display:grid;place-items:center;font-family:"Oswald",sans-serif;font-weight:700;
  font-size:24px;color:#fff;box-shadow:0 6px 16px -6px var(--accent);
}
.brand__text{display:flex;flex-direction:column;line-height:1.15}
.brand__team{font-family:"Oswald",sans-serif;font-weight:600;font-size:16.5px;letter-spacing:.01em;text-transform:uppercase;white-space:nowrap}
.brand__sub{font-size:11px;color:#86868f;letter-spacing:.03em;margin-top:2px}

.nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;overflow-x:hidden;margin-top:4px}
.nav__head{font-size:11px;color:#6c6c76;margin:16px 10px 6px;font-weight:600}
.navitem{
  position:relative;
  display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;
  color:#c7c7cf;font-size:14.5px;font-weight:500;text-align:left;width:100%;
  transition:background .14s,color .14s;
}
.navitem:hover{background:rgba(255,255,255,.05);color:#fff}
.navitem--on{background:rgba(255,255,255,.07);color:#fff}
.navitem--on .navitem__l{color:#fff}
.navitem svg{color:#8a8a94;flex-shrink:0}
.navitem--on svg{color:var(--accent)}
.navitem__l{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navitem__c{font-size:12px;color:#6c6c76;font-variant-numeric:tabular-nums;font-weight:600}
.navitem--on .navitem__c{color:#c7c7cf}
.navitem__grip{color:#5a5a63;margin-left:-3px;cursor:grab;flex-shrink:0;opacity:0;transition:opacity .14s}
.navitem:hover .navitem__grip{opacity:1}
.navitem--dragging{opacity:.45;background:color-mix(in srgb,var(--accent) 14%,transparent)}
.chip--dragging{opacity:.45;border-style:dashed;border-color:var(--accent)}
.chip{cursor:grab}

.progress{margin-top:10px;padding:15px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.progress__top{display:flex;justify-content:space-between;align-items:baseline}
.progress__lab{font-family:"Oswald",sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:#b6b6bf;font-weight:600}
.progress__pct{font-family:"Oswald",sans-serif;font-size:20px;font-weight:700;color:var(--accent)}
.progress__bar{height:7px;border-radius:5px;background:rgba(255,255,255,.09);margin:9px 0 7px;overflow:hidden}
.progress__fill{height:100%;border-radius:5px;background:var(--accent);transition:width .4s cubic-bezier(.4,0,.2,1)}
.progress__sub{font-size:11.5px;color:#86868f}

/* ---- Main ---- */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.top{
  display:flex;align-items:center;gap:14px;padding:16px var(--pad);
  border-bottom:1px solid var(--line);background:var(--bg2);flex-shrink:0;z-index:20;
}
.hamb{display:none;flex-direction:column;gap:4px;padding:6px}
.hamb span{width:20px;height:2px;background:var(--tx);border-radius:2px}
.searchbar{
  flex:1;max-width:560px;display:flex;align-items:center;gap:10px;
  padding:0 14px;height:44px;border-radius:11px;background:var(--surf);
  border:1px solid var(--line);transition:border-color .15s,box-shadow .15s;
}
.searchbar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
.searchbar svg{color:var(--tx3);flex-shrink:0}
.searchbar__in{flex:1;border:none;background:none;outline:none;color:var(--tx);font-size:15px}
.searchbar__in::placeholder{color:var(--tx3)}
.searchbar__x{display:grid;place-items:center;color:var(--tx3);padding:2px;border-radius:6px}
.searchbar__x:hover{color:var(--tx)}
.addbtn{
  display:flex;align-items:center;gap:8px;height:44px;padding:0 18px;border-radius:11px;
  background:var(--accent);color:#fff;font-weight:600;font-size:14.5px;flex-shrink:0;
  box-shadow:0 8px 20px -10px var(--accent);transition:transform .12s,filter .15s;
}
.addbtn:hover{filter:brightness(1.07)}
.addbtn:active{transform:translateY(1px)}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:var(--pad);scroll-behavior:smooth}
.phead{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin:0 auto 18px;max-width:var(--maxw)}
.phead__title{font-family:"Oswald",sans-serif;font-weight:700;font-size:34px;text-transform:uppercase;letter-spacing:.005em;line-height:1.05}
.phead__sub{color:var(--tx2);font-size:15px;margin-top:5px;max-width:560px}
.phead__count{font-family:"Oswald",sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);white-space:nowrap;font-weight:500}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 auto 22px;max-width:var(--maxw)}
.chip{
  display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;
  background:var(--surf);border:1px solid var(--line);color:var(--tx2);
  font-size:13.5px;font-weight:600;transition:all .14s;
}
.chip:hover{border-color:var(--line2);color:var(--tx)}
.chip--on{background:var(--accent);border-color:var(--accent);color:#fff}
.chip--on svg{color:#fff}
.chip--static{background:var(--surf2);color:var(--tx2);font-size:12.5px;padding:5px 11px;cursor:default;font-weight:500}

/* ---- Grid + cards ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:var(--gap);max-width:var(--maxw);margin:0 auto;align-items:start}
.grid--list{grid-template-columns:1fr;gap:12px}
.card{
  position:relative;
  background:var(--surf);border:1px solid var(--line);border-radius:var(--card-radius,14px);
  box-shadow:var(--card-rest-shadow,none);
  overflow:hidden;cursor:pointer;transition:transform .16s,border-color .16s,box-shadow .16s,opacity .16s;
  display:flex;flex-direction:column;
}
.card--dragging{opacity:.4;border-color:var(--accent);border-style:dashed}
.card__grip{position:absolute;top:8px;left:8px;z-index:3;display:grid;place-items:center;width:26px;height:26px;border-radius:7px;
  background:color-mix(in srgb,var(--bg2) 72%,transparent);color:var(--tx2);cursor:grab;opacity:0;transition:opacity .14s;backdrop-filter:blur(3px)}
.card--draggable:hover .card__grip{opacity:1}
.card__grip:active{cursor:grabbing}
.card--list .card__grip{top:50%;transform:translateY(-50%)}
.card:hover{transform:translateY(-3px);border-color:var(--line2);box-shadow:var(--shadow)}
.card--list{flex-direction:row;align-items:stretch}
.card__body{padding:var(--cardpad);display:flex;flex-direction:column;gap:9px;flex:1;min-width:0}
.card__top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.card__cat{display:flex;align-items:center;gap:6px;font-family:"Oswald",sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.card__learned{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#3fae6b;text-transform:uppercase;letter-spacing:.05em}
.card__title{font-family:"Oswald",sans-serif;font-weight:600;font-size:20px;line-height:1.12;letter-spacing:.005em}
.card__summary{color:var(--tx2);font-size:14px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-wrap:pretty}
.card__foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:4px}
.card__tags{display:flex;align-items:center;gap:8px}
.card__hasvid{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--tx3);font-weight:600}
.savebtn{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;color:var(--tx3);transition:all .14s}
.savebtn:hover{background:var(--surf2);color:var(--tx)}
.savebtn--on{color:var(--accent)}

.level{font-family:"Oswald",sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:5px;border:1px solid currentColor;line-height:1.4}
.level--fundamental{color:#5b97e0}
.level--varsity{color:#d98a2b}
.level--advanced{color:#cf5b6e}

/* video thumb */
.vthumb{position:relative;aspect-ratio:16/9;background:linear-gradient(135deg,#1b1b22,#0e0e13);display:grid;place-items:center;overflow:hidden}
.vthumb__img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.vthumb--live{cursor:pointer}
.player{position:relative;aspect-ratio:16/9;border-radius:12px;overflow:hidden;margin:6px 0 4px;background:#000}
.player iframe,.player video{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
.card--list .vthumb{width:150px;aspect-ratio:auto;flex-shrink:0;border-right:1px solid var(--line)}
.vthumb__grain{position:absolute;inset:0;opacity:.5;background:
  repeating-linear-gradient(115deg,rgba(255,255,255,.025) 0 2px,transparent 2px 5px),
  radial-gradient(circle at 30% 20%,color-mix(in srgb,var(--accent) 22%,transparent),transparent 60%)}
.vthumb__play{position:relative;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.14);backdrop-filter:blur(2px);display:grid;place-items:center;color:#fff;border:1.5px solid rgba(255,255,255,.5);padding-left:3px}
.card:hover .vthumb__play{background:var(--accent);border-color:var(--accent)}
.vthumb__meta{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:center}
.vthumb__film{font-family:"Oswald",sans-serif;font-size:10px;font-weight:700;letter-spacing:.18em;color:rgba(255,255,255,.85);background:rgba(0,0,0,.4);padding:3px 7px;border-radius:4px}
.vthumb__dur{font-size:11px;font-weight:600;color:#fff;background:rgba(0,0,0,.5);padding:3px 7px;border-radius:4px;font-variant-numeric:tabular-nums}
.vthumb--big{aspect-ratio:16/7;border-radius:12px;margin:6px 0 4px}
.vthumb--big.vthumb--live:hover .vthumb__play{background:var(--accent);border-color:var(--accent)}
.vthumb--big .vthumb__play{width:62px;height:62px}
.vthumb__label{position:absolute;bottom:12px;left:14px;color:#fff;font-size:13px;font-weight:600;text-shadow:0 1px 8px rgba(0,0,0,.6)}

/* film library (detail) */
.lib{display:flex;flex-direction:column;gap:12px}
.lib__stage{position:relative}
.lib__empty{display:grid;place-items:center;background:linear-gradient(135deg,#1b1b22,#0e0e13)}
:root[data-theme="light"] .lib__empty{background:linear-gradient(135deg,#ece9e2,#f4f2ec)}
.lib__emptytxt{position:relative;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--tx2);padding:18px}
.lib__emptytxt svg{color:var(--tx3);margin-bottom:4px}
.lib__emptytxt span{font-family:"Oswald",sans-serif;font-size:15px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx)}
.lib__emptytxt em{font-style:normal;font-size:12.5px;color:var(--tx3);max-width:280px}
.lib__count{font-family:"Oswald",sans-serif;font-size:11.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);font-weight:600}
.lib__strip{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;scroll-snap-type:x proximity}
.lib__strip::-webkit-scrollbar{height:7px}
.lib__strip::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.clip{flex:0 0 148px;scroll-snap-align:start;text-align:left;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--surf);transition:all .14s;display:flex;flex-direction:column}
.clip:hover{border-color:var(--line2)}
.clip--on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.clip__thumb{position:relative;aspect-ratio:16/9;display:grid;place-items:center;background:linear-gradient(135deg,#1b1b22,#0e0e13);color:#fff}
.clip__thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.clip__thumb--placeholder{color:var(--tx3);background:var(--surf2)}
.clip__meta{padding:8px 10px;display:flex;flex-direction:column;gap:2px;min-width:0}
.clip__role{font-family:"Oswald",sans-serif;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;color:var(--accent)}
.clip__label{font-size:12px;color:var(--tx2);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.clip--on .clip__label{color:var(--tx)}

/* empty */
.empty{max-width:var(--maxw);margin:40px auto;text-align:center;padding:50px 20px;display:flex;flex-direction:column;align-items:center;gap:6px}
.empty__mark{width:70px;height:70px;border-radius:50%;background:var(--surf);border:1px solid var(--line);display:grid;place-items:center;color:var(--tx3);margin-bottom:10px}
.empty h3{font-family:"Oswald",sans-serif;font-size:22px;text-transform:uppercase;letter-spacing:.02em}
.empty p{color:var(--tx2);font-size:14.5px;max-width:340px}

/* ============ DETAIL / MODAL ============ */
.detail{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;justify-content:flex-end;animation:fade .2s ease}
:root[data-theme="light"] .detail{background:rgba(30,26,22,.42)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.detail__panel{
  width:var(--detail-width,min(560px,100%));background:var(--bg2);height:100%;display:flex;flex-direction:column;
  position:relative;box-shadow:-30px 0 80px -30px rgba(0,0,0,.7);animation:slide .28s cubic-bezier(.4,0,.2,1);
  border-left:1px solid var(--line);
}
@keyframes slide{from{transform:translateX(40px);opacity:.4}to{transform:translateX(0);opacity:1}}
.detail__close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:10px;background:var(--surf);border:1px solid var(--line);display:grid;place-items:center;color:var(--tx2);z-index:5;transition:all .14s}
.detail__close:hover{color:var(--tx);border-color:var(--line2)}
.detail__tools{position:absolute;top:16px;right:16px;z-index:5;display:flex;gap:8px}
.detail__tool{width:38px;height:38px;border-radius:10px;background:var(--surf);border:1px solid var(--line);display:grid;place-items:center;color:var(--tx2);transition:all .14s}
.detail__tool:hover{color:var(--tx);border-color:var(--line2);background:var(--surf2)}
.detail__tool--danger:hover{color:#fff;background:#cf4452;border-color:#cf4452}
.confirm{position:absolute;inset:0;z-index:10;display:grid;place-items:center;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);animation:fade .16s ease}
.confirm__box{width:min(380px,90%);background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:24px;box-shadow:0 30px 70px -20px rgba(0,0,0,.6)}
.confirm__title{font-family:"Oswald",sans-serif;font-size:20px;text-transform:uppercase;letter-spacing:.02em;margin-bottom:8px}
.confirm__text{color:var(--tx2);font-size:14.5px;line-height:1.55;margin-bottom:20px;text-wrap:pretty}
.confirm__row{display:flex;gap:10px}
.action--danger{background:#cf4452}
.detail__inner{flex:1;overflow-y:auto;padding:34px 36px 30px}
.detail__cat{display:inline-flex;align-items:center;gap:7px;font-family:"Oswald",sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.detail__title{font-family:"Oswald",sans-serif;font-weight:700;font-size:32px;text-transform:uppercase;line-height:1.06;margin:10px 0 12px;letter-spacing:.005em;text-wrap:balance}
.detail__meta{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.detail__author{font-size:13px;color:var(--tx3);font-weight:500}
.detail__summary{font-size:16.5px;line-height:1.6;color:var(--tx);font-weight:400;text-wrap:pretty}
.detail__section{margin-top:24px}
.detail__h{font-family:"Oswald",sans-serif;font-size:14px;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);font-weight:600;margin-bottom:14px}
.steps{list-style:none;display:flex;flex-direction:column;gap:12px}
.step{display:flex;gap:14px;align-items:flex-start}
.step__n{flex-shrink:0;width:27px;height:27px;border-radius:50%;background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);font-family:"Oswald",sans-serif;font-weight:700;font-size:14px;display:grid;place-items:center;margin-top:1px}
.step__t{font-size:15.5px;line-height:1.55;color:var(--tx);padding-top:2px}
.steps--quote .step{padding:14px 18px;background:var(--surf);border-left:3px solid var(--accent);border-radius:0 9px 9px 0}
.steps--quote .step__t{font-size:16px;font-style:italic;color:var(--tx)}

.coachnote{margin-top:26px;background:color-mix(in srgb,var(--accent) 9%,var(--surf));border:1px solid color-mix(in srgb,var(--accent) 26%,transparent);border-radius:12px;padding:18px 20px 19px;position:relative}
.coachnote__tab{font-family:"Oswald",sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);font-weight:700;margin-bottom:8px}
.coachnote__body{font-size:15px;line-height:1.6;color:var(--tx);font-style:italic;text-wrap:pretty}

.docs{display:flex;flex-direction:column;gap:10px}
.doc{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
  background:var(--surf);border:1px solid var(--line);border-radius:11px;padding:13px 15px;
  color:var(--tx);transition:border-color .15s,background .15s,transform .05s}
.doc:hover{border-color:color-mix(in srgb,var(--accent) 50%,var(--line));background:color-mix(in srgb,var(--accent) 5%,var(--surf))}
.doc:active{transform:translateY(1px)}
.doc__ic{flex:0 0 auto;display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:9px;
  background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent)}
.doc__meta{flex:1 1 auto;min-width:0;display:flex;flex-direction:column;gap:2px}
.doc__name{font-weight:600;font-size:15px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc__type{font-size:12px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc__act{flex:0 0 auto;color:var(--tx3);display:flex;align-items:center}
.doc:hover .doc__act{color:var(--accent)}

.detail__tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:24px}

.detail__actions{display:flex;gap:10px;padding:16px 24px;border-top:1px solid var(--line);background:var(--bg2);flex-shrink:0}
.action{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:48px;border-radius:11px;background:var(--accent);color:#fff;font-weight:600;font-size:15px;transition:filter .14s,transform .1s}
.action:hover{filter:brightness(1.07)}
.action:active{transform:translateY(1px)}
.action--done{background:#2f9c5f}
.action--ghost{flex:0 0 auto;padding:0 20px;background:var(--surf);color:var(--tx);border:1px solid var(--line)}
.action--ghost:hover{filter:none;border-color:var(--line2)}
.action--saved{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 40%,transparent)}
.action--disabled{opacity:.4;pointer-events:none}

/* ============ FORM ============ */
.detail__panel--form{width:min(560px,100%)}
.f{display:flex;flex-direction:column;gap:7px;margin-top:16px}
.f__l{font-family:"Oswald",sans-serif;font-size:12.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);font-weight:600}
.f__l--inline{text-transform:none;letter-spacing:0;font-family:"Public Sans";font-size:14.5px;color:var(--tx)}
.f__hint{font-style:normal;text-transform:none;letter-spacing:0;color:var(--tx3);font-family:"Public Sans";font-size:12px;font-weight:400;margin-left:6px}
.f__in{padding:11px 13px;border-radius:10px;background:var(--surf);border:1px solid var(--line);color:var(--tx);font-size:15px;outline:none;transition:border-color .14s,box-shadow .14s;width:100%}
.f__in:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 16%,transparent)}
.f__in::placeholder{color:var(--tx3)}
.f__ta{resize:vertical;line-height:1.5}
.f__row{display:flex;gap:12px}
.f__row .f{flex:1}
.filmprev{display:flex;align-items:center;gap:12px;margin-top:10px;padding:10px 12px;border-radius:10px;background:color-mix(in srgb,var(--accent) 8%,var(--surf));border:1px solid color-mix(in srgb,var(--accent) 24%,transparent)}
.filmprev--warn{background:var(--surf2);border-color:var(--line2)}
.filmprev__thumb{width:64px;height:38px;object-fit:cover;border-radius:6px;flex-shrink:0}
.filmprev__txt{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--tx2)}
.filmprev:not(.filmprev--warn) .filmprev__txt svg{color:#3fae6b}
.f--check{flex-direction:row;align-items:center;gap:10px;cursor:pointer}
.f__check{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--line2);display:grid;place-items:center;color:#fff;flex-shrink:0;transition:all .14s}
.f__check--on{background:var(--accent);border-color:var(--accent)}

/* film builder (form) */
.fb{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.fb__empty{font-size:13.5px;color:var(--tx3);padding:14px;border:1px dashed var(--line2);border-radius:10px;text-align:center;text-wrap:pretty}
.fb__row{border:1px solid var(--line);border-radius:11px;padding:12px;display:flex;flex-direction:column;gap:9px;background:var(--surf)}
.fb__head{display:flex;gap:8px;align-items:center}
.fb__label{flex:1}
.fb__role{flex:0 0 130px;width:130px}
.fb__rm{flex-shrink:0;width:36px;height:36px;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;color:var(--tx3);transition:all .14s}
.fb__rm:hover{color:#fff;background:#cf4452;border-color:#cf4452}
.fb__src{display:flex;gap:8px;align-items:center}
.fb__url{flex:1}
.fb__or{font-size:12px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.fb__upload{display:flex;align-items:center;gap:6px;height:42px;padding:0 14px;border-radius:10px;border:1px solid var(--line2);color:var(--tx);font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .14s}
.fb__upload:hover{border-color:var(--accent);color:var(--accent)}
.fb__file{flex:1;display:flex;align-items:center;gap:9px;height:42px;padding:0 13px;border-radius:10px;background:color-mix(in srgb,var(--accent) 8%,var(--surf2));border:1px solid color-mix(in srgb,var(--accent) 24%,transparent);font-size:13.5px;color:var(--tx)}
.fb__file svg{color:#3fae6b;flex-shrink:0}
.fb__filename{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.fb__clear{font-size:12.5px;color:var(--tx3);font-weight:600;padding:4px 8px;border-radius:6px}
.fb__clear:hover{color:var(--tx);background:var(--surf)}
.fb__prev{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--tx2)}
.fb__prev svg{color:#3fae6b}
.fb__prev--warn svg{color:var(--tx3)}
.fb__prevthumb{width:48px;height:28px;object-fit:cover;border-radius:5px}
.fb__add{display:flex;align-items:center;justify-content:center;gap:7px;height:44px;border-radius:10px;border:1px dashed var(--line2);color:var(--tx2);font-weight:600;font-size:14px;transition:all .14s}
.fb__add:hover{border-color:var(--accent);color:var(--accent)}

/* scrim + mobile nav */
.scrim{display:none}
@media(max-width:920px){
  .side{position:fixed;inset:0 auto 0 0;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1)}
  .side--open{transform:translateX(0);box-shadow:30px 0 80px -20px rgba(0,0,0,.6)}
  .scrim{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}
  .hamb{display:flex}
  .phead__title{font-size:27px}
  .addbtn span{display:none}
  .addbtn{padding:0 14px}
  .content{padding:20px}
  .top{padding:14px 20px}
}
@media(max-width:560px){
  .grid{grid-template-columns:1fr}
  .detail__inner{padding:30px 22px 24px}
  .detail__title{font-size:27px}
  .card--list{flex-direction:column}
  .card--list .vthumb{width:100%;aspect-ratio:16/9;border-right:none;border-bottom:1px solid var(--line)}
}

/* scrollbars */
.content::-webkit-scrollbar,.detail__inner::-webkit-scrollbar,.nav::-webkit-scrollbar{width:9px}
.content::-webkit-scrollbar-thumb,.detail__inner::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px;border:2px solid var(--bg)}
.nav::-webkit-scrollbar{width:0}

/* ---- Access gate ---- */
.gate{position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,color-mix(in srgb,var(--accent) 12%,var(--bg)),var(--bg) 70%);padding:24px}
.gate__card{display:flex;flex-direction:column;align-items:center;gap:13px;width:100%;max-width:360px;background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:38px 30px 32px;box-shadow:var(--shadow);text-align:center}
.gate__mark{width:54px;height:54px;border-radius:13px;display:grid;place-items:center;background:var(--accent);color:#fff;font-family:"Oswald",sans-serif;font-weight:700;font-size:30px;line-height:1}
.gate__team{font-family:"Oswald",sans-serif;font-size:24px;font-weight:600;color:var(--tx);text-transform:uppercase;letter-spacing:.02em;margin:2px 0 0}
.gate__sub{font-size:13.5px;color:var(--tx2);line-height:1.5;margin:0 0 6px;text-wrap:pretty}
.gate__in{width:100%;padding:12px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--line2);color:var(--tx);font-size:15px;text-align:center;letter-spacing:.04em}
.gate__in:focus{outline:none;border-color:var(--accent)}
.gate__in--err{border-color:#e2483f}
.gate__err{font-size:12.5px;color:#e2766f}
.gate__btn{width:100%;padding:12px;border-radius:10px;background:var(--accent);color:#fff;font-family:"Oswald",sans-serif;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;border:none;transition:filter .14s}
.gate__btn:hover{filter:brightness(1.08)}

/* ---- Role bar ---- */
.rolebar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:10px 0 2px;padding:7px 11px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.rolebar__tag{font-family:"Oswald",sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2)}
.rolebar__tag--coach{color:var(--accent)}
.rolebar__out{font-size:12px;color:var(--tx3);cursor:pointer;background:none;border:none;text-decoration:underline;text-underline-offset:2px}
.rolebar__out:hover{color:var(--tx)}
</style>
</head>

<text x="50" y="63" font-family="Oswald,sans-serif" font-size="30" font-weight="700" fill="#fff" text-anchor="middle">W</text>

      "category": "mindset",
      "level": "Fundamental",
      "tags": [
        "toughness",

      "author": "Coach Cassioppi",
      "hasVideo": false,
      "duration": null,
      "summary": "Reframing hard practices and tough losses as the exact thing that builds a champion.",
      "steps": [
        "Name the discomfort — fatigue, doubt, soreness — then keep moving anyway.",
        "Treat every tough partner as a free scouting report on your weaknesses.",
        "After a loss, separate emotion from information. Watch the film, fix one thing.",
        "Show up the next day. Consistency under fatigue is the whole skill."
      ],
      "coachNotes": "Nobody remembers the easy days. The grind is the point. When it's hardest is exactly when you're becoming who you want to be.",

      "docs": []

      "summary": "The five things every wrestler in this room is held to — on the mat and off it.",
      "steps": [

        "Out-work the room. Effort is the one thing fully in your control.",

        "Pick your teammates up. A hard room makes hard wrestlers.",
        "Finish everything you start — drills, sprints, matches, seasons."

      "coachNotes": "Talent is common. The standard is what separates us. You don't rise to the occasion — you fall to your training. Hold the standard daily."
